name: Wheels

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
     - main
  release:
    types:
      - published

jobs:
  build_sdist:
    name: Build SDist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Build SDist
      run: uv build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz


  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Cache CPM packages
      uses: actions/cache@v4
      with:
        path: ${{ env.CPM_SOURCE_CACHE }}
        key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: |
          cpm-${{ runner.os }}-

    - uses: pypa/cibuildwheel@v3.4.1
      env:
        CIBW_BUILD: "cp312-*"
        CIBW_ARCHS_MACOS: x86_64 arm64
        CIBW_BUILD_FRONTEND: "build[uv]"
        CIBW_ENVIRONMENT: "CPM_SOURCE_CACHE=/project/.cpm-cache"
        CIBW_ENVIRONMENT_WINDOWS: "CPM_SOURCE_CACHE=/project/.cpm-cache"

    - name: Verify clean directory
      run: git diff --exit-code
      shell: bash

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: wheelhouse/*.whl


  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    permissions:
      id-token: write

    steps:
    - uses: astral-sh/setup-uv@v6

    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      run: uv publish dist/*
